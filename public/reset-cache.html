<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Inovtek Local Cache</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: #031A3C;
        background: #f5f8fc;
      }
      main {
        width: min(420px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid #d9e5f4;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 18px 48px rgba(3, 26, 60, .12);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reset cache lokal...</h1>
      <p>Halaman akan kembali otomatis.</p>
    </main>
    <script>
      (async () => {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith("inovtek-")).map((key) => caches.delete(key)));
        }
        sessionStorage.setItem("inovtek-sw-reset", "1");
        location.replace("/#home");
      })().catch(() => location.replace("/#home"));
    </script>
  </body>
</html>
